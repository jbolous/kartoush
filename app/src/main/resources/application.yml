
spring:
  application:
    name: kartoush

  datasource:
    url: jdbc:postgresql://localhost:5432/kartoush
    username: kartoush
    password: kartoush
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: kartoush
    schemas: kartoush

logging:
  level:
    org.flywaydb: info
    com.kartoush: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
    root: info

kartoush:
  email:
    customer:
      sender-name: ${KARTOUSH_EMAIL_SENDER_NAME:Kartoush}
      sender-address: ${KARTOUSH_EMAIL_SENDER_ADDRESS:no-reply@notify.kartoush.com}
      activation-base-url: ${KARTOUSH_EMAIL_ACTIVATION_BASE_URL:https://kartoush.dev/activate}
      password-reset-base-url: ${KARTOUSH_EMAIL_PASSWORD_RESET_BASE_URL:https://kartoush.dev/reset-password}
    delivery:
      provider: ${KARTOUSH_EMAIL_DELIVERY_PROVIDER:noop}
      enabled: ${KARTOUSH_EMAIL_DELIVERY_ENABLED:false}
  auth:
    password-policy:
      min-length: 12
      max-length: 255
      require-uppercase: true
      require-lowercase: true
      require-digit: true
      require-special-character: true
