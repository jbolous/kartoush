name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit test suite
        run: ./gradlew --no-daemon test

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run integration test suite
        run: ./gradlew --no-daemon :app:integrationTest :customer:integrationTest

  verify:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - integration-tests
    if: ${{ always() }}

    steps:
      - name: Validate upstream job results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.integration-tests.result }}" != "success" ]; then
            echo "One or more verification jobs failed."
            echo "unit-tests=${{ needs.unit-tests.result }}"
            echo "integration-tests=${{ needs.integration-tests.result }}"
            exit 1
          fi
