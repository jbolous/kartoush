name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit test suite
        run: ./gradlew --no-daemon test

  app-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: customer-creation-contract
            test-class: com.kartoush.api.customer.CustomerCreationRestAssuredIntegrationTest
          - name: customer-duplicate-email-contract
            test-class: com.kartoush.api.customer.CustomerDuplicateEmailRestAssuredIntegrationTest
          - name: customer-activation-contract
            test-class: com.kartoush.api.customer.CustomerActivationIntegrationTest
          - name: terms-of-service-metadata-contract
            test-class: com.kartoush.api.terms.TermsOfServiceMetadataIntegrationTest

    name: App integration tests (${{ matrix.name }})

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run app integration test class
        run: ./gradlew --no-daemon :app:integrationTest --tests ${{ matrix.test-class }}

  customer-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run customer integration test suite
        run: ./gradlew --no-daemon :customer:integrationTest

  verify:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - app-integration-tests
      - customer-integration-tests
    if: ${{ always() }}

    steps:
      - name: Validate upstream job results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.app-integration-tests.result }}" != "success" ] || [ "${{ needs.customer-integration-tests.result }}" != "success" ]; then
            echo "One or more verification jobs failed."
            echo "unit-tests=${{ needs.unit-tests.result }}"
            echo "app-integration-tests=${{ needs.app-integration-tests.result }}"
            echo "customer-integration-tests=${{ needs.customer-integration-tests.result }}"
            exit 1
          fi
