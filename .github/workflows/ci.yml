name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run unit test suite
        run: ./gradlew --no-daemon test

  api-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: auth-api-integration-tests
            test-filter: com.kartoush.api.auth.*
          - name: customer-api-integration-tests
            test-filter: com.kartoush.api.customer.*
          - name: terms-api-integration-tests
            test-filter: com.kartoush.api.terms.*

    name: API integration tests (${{ matrix.name }})

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run app integration test group
        run: ./gradlew --no-daemon :app:integrationTest --tests '${{ matrix.test-filter }}'

  customer-module-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run customer integration test suite
        run: ./gradlew --no-daemon :customer:integrationTest

  auth-module-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run auth integration test suite
        run: ./gradlew --no-daemon :auth:integrationTest

  verify:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - api-integration-tests
      - customer-module-integration-tests
      - auth-module-integration-tests
    if: ${{ always() }}

    steps:
      - name: Validate upstream job results
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || [ "${{ needs.api-integration-tests.result }}" != "success" ] || [ "${{ needs.customer-module-integration-tests.result }}" != "success" ] || [ "${{ needs.auth-module-integration-tests.result }}" != "success" ]; then
            echo "One or more verification jobs failed."
            echo "unit-tests=${{ needs.unit-tests.result }}"
            echo "api-integration-tests=${{ needs.api-integration-tests.result }}"
            echo "customer-module-integration-tests=${{ needs.customer-module-integration-tests.result }}"
            echo "auth-module-integration-tests=${{ needs.auth-module-integration-tests.result }}"
            exit 1
          fi
