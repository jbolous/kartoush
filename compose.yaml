services:
  postgres:
    image: postgres:16
    container_name: kartoush-postgres
    environment:
      POSTGRES_DB: kartoush
      POSTGRES_USER: kartoush
      POSTGRES_PASSWORD: kartoush
    ports:
      - "5432:5432"
    volumes:
      - kartoush_pgdata:/var/lib/postgresql/data

volumes:
  kartoush_pgdata:
