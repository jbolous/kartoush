spring:
  application:
    name: kartoush

  datasource:
    url: jdbc:postgresql://localhost:5432/kartoush
    username: kartoush
    password: kartoush
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: info
