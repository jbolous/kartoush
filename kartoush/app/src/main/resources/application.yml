
spring:
  application:
    name: kartoush

  datasource:
    url: jdbc:postgresql://localhost:5432/kartoush
    username: kartoush
    password: kartoush
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: kartoush
    schemas: kartoush

logging:
  level:
    org.flywaydb: info
    com.kartoush: TRACE
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.transaction: TRACE
    org.springframework.orm.jpa: DEBUG
    root: info
